version: '3.8'
services:
  # Zookeeper per Kafka
  zookeeper:
    image: confluentinc/cp-zookeeper:7.4.0
    container_name: bb_zookeeper
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000
    ports:
      - "2181:2181"
    networks:
      - brainbrawler

  # Kafka Broker
  kafka:
    image: confluentinc/cp-kafka:7.4.0
    container_name: bb_kafka
    depends_on:
      - zookeeper
    ports:
      - "9092:9092"
      - "29092:29092"
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://localhost:9092,PLAINTEXT_HOST://localhost:29092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: 'true'
    networks:
      - brainbrawler

  # Redis per cache e sessioni
  redis:
    image: redis:7-alpine
    container_name: bb_redis
    ports:
      - "6379:6379"
    command: redis-server --appendonly yes
    volumes:
      - redis_data:/data
    networks:
      - brainbrawler

  # PostgreSQL Database
  postgres:
    image: postgres:15
    container_name: bb_postgres
    environment:
      POSTGRES_DB: brainbrawler
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: dev_password_123
      POSTGRES_HOST_AUTH_METHOD: trust
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - brainbrawler

  # Adminer per gestione DB
  adminer:
    image: adminer
    container_name: bb_adminer
    ports:
      - "8080:8080"
    depends_on:
      - postgres
    networks:
      - brainbrawler

  # Kafka UI per monitoraggio
  kafka-ui:
    image: provectuslabs/kafka-ui:latest
    container_name: bb_kafka_ui
    ports:
      - "8090:8080"
    environment:
      KAFKA_CLUSTERS_0_NAME: local
      KAFKA_CLUSTERS_0_BOOTSTRAPSERVERS: kafka:9092
    depends_on:
      - kafka
    networks:
      - brainbrawler

volumes:
  postgres_data:
  redis_data:

networks:
  brainbrawler:
    driver: bridge 