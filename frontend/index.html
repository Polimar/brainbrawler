<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🧠 BrainBrawler - Test Client</title>
    <script src="https://cdn.socket.io/4.7.5/socket.io.min.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
            color: white;
        }
        
        .container {
            max-width: 1200px;
            margin: 0 auto;
        }
        
        .header {
            text-align: center;
            margin-bottom: 40px;
        }
        
        .header h1 {
            font-size: 3rem;
            margin-bottom: 10px;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.3);
        }
        
        .status {
            background: rgba(255,255,255,0.1);
            padding: 20px;
            border-radius: 15px;
            margin-bottom: 30px;
            backdrop-filter: blur(10px);
        }
        
        .controls {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 20px;
            margin-bottom: 30px;
        }
        
        .card {
            background: rgba(255,255,255,0.1);
            padding: 25px;
            border-radius: 15px;
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255,255,255,0.2);
        }
        
        .card h3 {
            margin-bottom: 15px;
            color: #ffd700;
        }
        
        input, button, select {
            width: 100%;
            padding: 12px;
            margin: 8px 0;
            border: none;
            border-radius: 8px;
            font-size: 16px;
        }
        
        button {
            background: linear-gradient(45deg, #ff6b6b, #ffd93d);
            color: white;
            font-weight: bold;
            cursor: pointer;
            transition: transform 0.2s, box-shadow 0.2s;
        }
        
        button:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 25px rgba(0,0,0,0.3);
        }
        
        button:disabled {
            background: #666;
            cursor: not-allowed;
            transform: none;
        }
        
        .logs {
            background: rgba(0,0,0,0.3);
            padding: 20px;
            border-radius: 15px;
            height: 300px;
            overflow-y: auto;
            font-family: 'Courier New', monospace;
            font-size: 14px;
            border: 1px solid rgba(255,255,255,0.2);
        }
        
        .log-entry {
            margin-bottom: 8px;
            padding: 5px 0;
            border-bottom: 1px solid rgba(255,255,255,0.1);
        }
        
        .log-timestamp {
            color: #aaa;
            font-size: 12px;
        }
        
        .log-success { color: #4caf50; }
        .log-error { color: #f44336; }
        .log-info { color: #2196f3; }
        .log-warning { color: #ff9800; }
        
        .connected { color: #4caf50; }
        .disconnected { color: #f44336; }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>🧠 BrainBrawler</h1>
            <p>Test Client per Backend Docker</p>
        </div>
        
        <div class="status">
            <h3>📊 Status del Sistema</h3>
            <p>🔌 Connessione Socket.io: <span id="connectionStatus" class="disconnected">Disconnesso</span></p>
            <p>🎮 Stato Gioco: <span id="gameStatus">In attesa</span></p>
            <p>👤 Utente: <span id="currentUser">Non autenticato</span></p>
        </div>
        
        <div class="controls">
            <div class="card">
                <h3>🔐 Autenticazione</h3>
                <input type="text" id="username" placeholder="Username" value="testuser">
                <input type="email" id="email" placeholder="Email" value="test@brainbrawler.com">
                <input type="password" id="password" placeholder="Password" value="test123">
                <button onclick="register()">📝 Registrati</button>
                <button onclick="login()">🔑 Login</button>
            </div>
            
            <div class="card">
                <h3>🏠 Gestione Stanze</h3>
                <input type="text" id="roomCode" placeholder="Codice Stanza (es: ABC123)">
                <button onclick="createRoom()" id="createRoomBtn" disabled>🆕 Crea Stanza</button>
                <button onclick="joinRoom()" id="joinRoomBtn" disabled>🚪 Entra in Stanza</button>
                <button onclick="startGame()" id="startGameBtn" disabled>🎮 Inizia Partita</button>
            </div>
            
            <div class="card">
                <h3>❓ Test Domande</h3>
                <p>Risposta alla domanda corrente:</p>
                <button onclick="submitAnswer(0)" class="answer-btn" disabled>A) Opzione 1</button>
                <button onclick="submitAnswer(1)" class="answer-btn" disabled>B) Opzione 2</button>
                <button onclick="submitAnswer(2)" class="answer-btn" disabled>C) Opzione 3</button>
                <button onclick="submitAnswer(3)" class="answer-btn" disabled>D) Opzione 4</button>
            </div>
        </div>
        
        <div class="card">
            <h3>📝 Logs del Sistema</h3>
            <div id="logs" class="logs"></div>
            <button onclick="clearLogs()" style="width: auto; margin-top: 10px;">🗑️ Pulisci Logs</button>
        </div>
    </div>

    <script>
        let socket = null;
        let currentToken = null;
        let currentRoomCode = null;
        
        // Funzioni di logging
        function log(message, type = 'info') {
            const logs = document.getElementById('logs');
            const timestamp = new Date().toLocaleTimeString();
            const logEntry = document.createElement('div');
            logEntry.className = `log-entry log-${type}`;
            logEntry.innerHTML = `
                <span class="log-timestamp">[${timestamp}]</span> 
                ${message}
            `;
            logs.appendChild(logEntry);
            logs.scrollTop = logs.scrollHeight;
        }
        
        function clearLogs() {
            document.getElementById('logs').innerHTML = '';
        }
        
        // Configurazione dinamica dell'API
        const API_BASE = window.location.hostname === 'localhost' ? 'http://localhost:3000' : `http://${window.location.hostname}:3000`;
        
        // Funzioni di autenticazione
        async function register() {
            const username = document.getElementById('username').value;
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;
            
            try {
                const response = await fetch(`${API_BASE}/api/auth/register`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ username, email, password })
                });
                
                const data = await response.json();
                
                if (response.ok) {
                    log(`✅ Registrazione completata: ${data.user.username}`, 'success');
                    currentToken = data.token;
                    document.getElementById('currentUser').textContent = data.user.username;
                    connectSocket();
                } else {
                    log(`❌ Errore registrazione: ${data.error}`, 'error');
                }
            } catch (error) {
                log(`❌ Errore di rete: ${error.message}`, 'error');
            }
        }
        
        async function login() {
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;
            
            try {
                const response = await fetch(`${API_BASE}/api/auth/login`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ email, password })
                });
                
                const data = await response.json();
                
                if (response.ok) {
                    log(`✅ Login completato: ${data.user.username}`, 'success');
                    currentToken = data.token;
                    document.getElementById('currentUser').textContent = data.user.username;
                    connectSocket();
                } else {
                    log(`❌ Errore login: ${data.error}`, 'error');
                }
            } catch (error) {
                log(`❌ Errore di rete: ${error.message}`, 'error');
            }
        }
        
        // Connessione Socket.io
        function connectSocket() {
            if (socket) {
                socket.disconnect();
            }
            
            socket = io(API_BASE, {
                auth: {
                    token: currentToken
                }
            });
            
            socket.on('connect', () => {
                log('🔌 Connesso al server Socket.io Docker', 'success');
                document.getElementById('connectionStatus').textContent = 'Connesso';
                document.getElementById('connectionStatus').className = 'connected';
                enableButtons();
            });
            
            socket.on('disconnect', () => {
                log('🔌 Disconnesso dal server', 'warning');
                document.getElementById('connectionStatus').textContent = 'Disconnesso';
                document.getElementById('connectionStatus').className = 'disconnected';
                disableButtons();
            });
            
            socket.on('error', (data) => {
                log(`❌ Errore: ${data.message}`, 'error');
            });
            
            socket.on('room-created', (data) => {
                log(`🏠 Stanza creata: ${data.roomCode}`, 'success');
                currentRoomCode = data.roomCode;
                document.getElementById('roomCode').value = data.roomCode;
                document.getElementById('gameStatus').textContent = `In stanza: ${data.roomCode}`;
            });
            
            socket.on('player-joined', (data) => {
                log(`👤 Giocatore entrato nella stanza`, 'info');
            });
            
            socket.on('game-started', (data) => {
                log(`🎮 Partita iniziata!`, 'success');
                document.getElementById('gameStatus').textContent = 'Partita in corso';
                enableAnswerButtons();
            });
            
            socket.on('question', (data) => {
                log(`❓ Nuova domanda: ${data.text}`, 'info');
                updateAnswerButtons(data.options);
            });
            
            socket.on('round-results', (data) => {
                log(`📊 Risultati round ricevuti`, 'info');
            });
            
            socket.on('answer-received', (data) => {
                if (data.success) {
                    log(`✅ Risposta inviata correttamente`, 'success');
                }
            });
        }
        
        // Funzioni di gestione stanze
        function createRoom() {
            if (!socket) return;
            
            log('🏠 Creazione stanza...', 'info');
            socket.emit('create-room', {
                questionSetId: 'default'
            });
        }
        
        function joinRoom() {
            if (!socket) return;
            
            const roomCode = document.getElementById('roomCode').value.toUpperCase();
            if (!roomCode) {
                log('❌ Inserisci un codice stanza', 'error');
                return;
            }
            
            log(`🚪 Tentativo di entrare nella stanza: ${roomCode}`, 'info');
            socket.emit('join-room', { roomCode });
            currentRoomCode = roomCode;
        }
        
        function startGame() {
            if (!socket || !currentRoomCode) return;
            
            log(`🎮 Avvio partita nella stanza: ${currentRoomCode}`, 'info');
            socket.emit('start-game', { roomCode: currentRoomCode });
        }
        
        function submitAnswer(answerIndex) {
            if (!socket || !currentRoomCode) return;
            
            log(`📝 Invio risposta: ${answerIndex}`, 'info');
            socket.emit('submit-answer', {
                roomCode: currentRoomCode,
                questionId: 'test-question-1',
                answer: answerIndex,
                timestamp: Date.now()
            });
        }
        
        // Funzioni di controllo UI
        function enableButtons() {
            document.getElementById('createRoomBtn').disabled = false;
            document.getElementById('joinRoomBtn').disabled = false;
            document.getElementById('startGameBtn').disabled = false;
        }
        
        function disableButtons() {
            document.getElementById('createRoomBtn').disabled = true;
            document.getElementById('joinRoomBtn').disabled = true;
            document.getElementById('startGameBtn').disabled = true;
            disableAnswerButtons();
        }
        
        function enableAnswerButtons() {
            const buttons = document.querySelectorAll('.answer-btn');
            buttons.forEach(btn => btn.disabled = false);
        }
        
        function disableAnswerButtons() {
            const buttons = document.querySelectorAll('.answer-btn');
            buttons.forEach(btn => btn.disabled = true);
        }
        
        function updateAnswerButtons(options) {
            const buttons = document.querySelectorAll('.answer-btn');
            buttons.forEach((btn, index) => {
                if (options && options[index]) {
                    btn.textContent = `${String.fromCharCode(65 + index)}) ${options[index]}`;
                }
            });
        }
        
        // Inizializzazione
        log('🚀 BrainBrawler Test Client Docker avviato (v2.0)', 'info');
        log('📝 Usa le credenziali di test precompilate', 'info');
        log(`🌐 API Base: ${API_BASE}`, 'info');
    </script>
</body>
</html>
