<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Manage Questions - BrainBrawler</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
        }

        .header {
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(10px);
            border-radius: 20px;
            padding: 30px;
            margin-bottom: 20px;
            text-align: center;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.1);
        }

        .header h1 {
            color: #2d3748;
            font-size: 2.5rem;
            font-weight: 700;
            margin-bottom: 10px;
        }

        .premium-badge {
            display: inline-block;
            background: linear-gradient(45deg, #f093fb 0%, #f5576c 100%);
            color: white;
            padding: 8px 20px;
            border-radius: 25px;
            font-size: 0.9rem;
            font-weight: 600;
            margin-bottom: 15px;
        }

        .tabs {
            display: flex;
            gap: 10px;
            margin-bottom: 30px;
        }

        .tab {
            background: rgba(255, 255, 255, 0.3);
            border: none;
            padding: 12px 24px;
            border-radius: 25px;
            color: white;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .tab.active {
            background: rgba(255, 255, 255, 0.9);
            color: #2d3748;
        }

        .content-section {
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(10px);
            border-radius: 20px;
            padding: 30px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.1);
            display: none;
        }

        .content-section.active {
            display: block;
        }

        .action-bar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 30px;
            flex-wrap: wrap;
            gap: 15px;
        }

        .search-bar {
            display: flex;
            gap: 10px;
            flex: 1;
            max-width: 500px;
        }

        .search-bar input,
        .search-bar select {
            padding: 12px 16px;
            border: 2px solid #e2e8f0;
            border-radius: 10px;
            font-size: 1rem;
        }

        .search-bar input {
            flex: 1;
        }

        .search-bar select {
            min-width: 120px;
        }

        .btn {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            padding: 12px 24px;
            border-radius: 10px;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            transition: transform 0.2s ease;
            display: inline-flex;
            align-items: center;
            gap: 8px;
        }

        .btn:hover {
            transform: translateY(-2px);
        }

        .btn-danger {
            background: linear-gradient(135deg, #f56565 0%, #e53e3e 100%);
        }

        .btn-warning {
            background: linear-gradient(135deg, #ed8936 0%, #dd6b20 100%);
        }

        .questions-grid {
            display: grid;
            gap: 20px;
        }

        .question-card {
            background: white;
            border-radius: 15px;
            padding: 20px;
            box-shadow: 0 5px 15px rgba(0, 0, 0, 0.08);
            border-left: 4px solid #667eea;
        }

        .question-card.easy {
            border-left-color: #48bb78;
        }

        .question-card.medium {
            border-left-color: #ed8936;
        }

        .question-card.hard {
            border-left-color: #f56565;
        }

        .question-header {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            margin-bottom: 15px;
        }

        .question-text {
            font-size: 1.1rem;
            font-weight: 600;
            color: #2d3748;
            margin-bottom: 10px;
        }

        .question-meta {
            display: flex;
            gap: 15px;
            font-size: 0.8rem;
            color: #718096;
        }

        .question-options {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 10px;
            margin: 15px 0;
        }

        .option {
            padding: 8px 12px;
            background: #f7fafc;
            border-radius: 8px;
            font-size: 0.9rem;
        }

        .option.correct {
            background: #c6f6d5;
            color: #22543d;
            font-weight: 600;
        }

        .question-actions {
            display: flex;
            gap: 10px;
            margin-top: 15px;
        }

        .question-actions .btn {
            padding: 8px 16px;
            font-size: 0.9rem;
        }

        .form-group {
            margin-bottom: 20px;
        }

        .form-group label {
            display: block;
            margin-bottom: 8px;
            color: #2d3748;
            font-weight: 600;
        }

        .form-group input,
        .form-group select,
        .form-group textarea {
            width: 100%;
            padding: 12px 16px;
            border: 2px solid #e2e8f0;
            border-radius: 10px;
            font-size: 1rem;
            resize: vertical;
        }

        .form-group input:focus,
        .form-group select:focus,
        .form-group textarea:focus {
            outline: none;
            border-color: #667eea;
        }

        .options-container {
            display: grid;
            gap: 10px;
        }

        .option-input {
            display: flex;
            gap: 10px;
            align-items: center;
        }

        .option-input input[type="radio"] {
            width: auto;
            margin: 0;
        }

        .option-input input[type="text"] {
            flex: 1;
        }

        .empty-state {
            text-align: center;
            padding: 60px 20px;
            color: #718096;
        }

        .empty-state i {
            font-size: 4rem;
            margin-bottom: 20px;
            color: #cbd5e0;
        }

        @media (max-width: 768px) {
            .container {
                padding: 10px;
            }
            
            .header {
                padding: 20px;
            }
            
            .header h1 {
                font-size: 2rem;
            }
            
            .action-bar {
                flex-direction: column;
                align-items: stretch;
            }
            
            .search-bar {
                max-width: none;
            }
            
            .question-options {
                grid-template-columns: 1fr;
            }
            
            .tabs {
                flex-wrap: wrap;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1><i class="fas fa-question-circle"></i> Manage Questions</h1>
            <div class="premium-badge">
                <i class="fas fa-crown"></i> Premium Feature
            </div>
            <p>Create and manage your custom quiz questions</p>
        </div>

        <div class="tabs">
            <button class="tab active" onclick="switchTab('my-questions')">
                <i class="fas fa-list"></i> My Questions
            </button>
            <button class="tab" onclick="switchTab('create-question')">
                <i class="fas fa-plus"></i> New Question
            </button>
        </div>

        <!-- My Questions Tab -->
        <div id="my-questions" class="content-section active">
            <div class="action-bar">
                <div class="search-bar">
                    <input type="text" id="searchInput" placeholder="Search questions...">
                    <select id="categoryFilter">
                        <option value="">All Categories</option>
                    </select>
                    <select id="difficultyFilter">
                        <option value="">All Difficulties</option>
                        <option value="EASY">Easy</option>
                        <option value="MEDIUM">Medium</option>
                        <option value="HARD">Hard</option>
                    </select>
                </div>
                <button class="btn" onclick="switchTab('create-question')">
                    <i class="fas fa-plus"></i> New Question
                </button>
            </div>

            <div class="questions-grid" id="questionsContainer">
                <!-- Questions will be loaded here -->
            </div>
        </div>

        <!-- Create Question Tab -->
        <div id="create-question" class="content-section">
            <form id="createQuestionForm">
                <div class="form-group">
                    <label for="questionText">Question Text</label>
                    <textarea id="questionText" name="questionText" rows="3" placeholder="Enter your question..." required></textarea>
                </div>

                <div class="form-group">
                    <label for="questionCategory">Category</label>
                    <select id="questionCategory" name="category" required>
                        <option value="">Select Category</option>
                    </select>
                </div>

                <div class="form-group">
                    <label for="questionDifficulty">Difficulty</label>
                    <select id="questionDifficulty" name="difficulty" required>
                        <option value="EASY">Easy</option>
                        <option value="MEDIUM">Medium</option>
                        <option value="HARD">Hard</option>
                    </select>
                </div>

                <div class="form-group">
                    <label>Answer Options (Select the correct one)</label>
                    <div class="options-container">
                        <div class="option-input">
                            <input type="radio" name="correctAnswer" value="0" required>
                            <label>A.</label>
                            <input type="text" name="option0" placeholder="Option A" required>
                        </div>
                        <div class="option-input">
                            <input type="radio" name="correctAnswer" value="1" required>
                            <label>B.</label>
                            <input type="text" name="option1" placeholder="Option B" required>
                        </div>
                        <div class="option-input">
                            <input type="radio" name="correctAnswer" value="2" required>
                            <label>C.</label>
                            <input type="text" name="option2" placeholder="Option C" required>
                        </div>
                        <div class="option-input">
                            <input type="radio" name="correctAnswer" value="3" required>
                            <label>D.</label>
                            <input type="text" name="option3" placeholder="Option D" required>
                        </div>
                    </div>
                </div>

                <div class="form-group">
                    <label for="explanation">Explanation (Optional)</label>
                    <textarea id="explanation" name="explanation" rows="2" placeholder="Explain why this is the correct answer..."></textarea>
                </div>

                <button type="submit" class="btn">
                    <i class="fas fa-save"></i> Create Question
                </button>
            </form>
        </div>
    </div>

    <script>
        let currentTab = 'my-questions';
        let questions = [];
        let categories = [];

        document.addEventListener('DOMContentLoaded', function() {
            checkPremiumAccess();
            loadData();
            setupEventListeners();
        });

        function checkPremiumAccess() {
            const user = JSON.parse(localStorage.getItem('brainbrawler_user') || '{}');
            if (!user.token || (user.accountType !== 'PREMIUM' && user.accountType !== 'ADMIN')) {
                alert('This feature requires a Premium account! Upgrade now to manage custom questions.');
                window.location.href = 'lobby.html';
                return;
            }
        }

        function setupEventListeners() {
            document.getElementById('searchInput').addEventListener('input', filterQuestions);
            document.getElementById('categoryFilter').addEventListener('change', filterQuestions);
            document.getElementById('difficultyFilter').addEventListener('change', filterQuestions);
            document.getElementById('createQuestionForm').addEventListener('submit', handleCreateQuestion);
        }

        async function loadData() {
            await Promise.all([
                loadCategories(),
                loadQuestions()
            ]);
        }

        async function loadCategories() {
            try {
                const response = await fetch(`http://${window.location.hostname}:3000/api/game/categories`);
                const data = await response.json();
                
                if (data.categories) {
                    categories = data.categories;
                    populateCategorySelects();
                }
            } catch (error) {
                console.error('Failed to load categories:', error);
            }
        }

        function populateCategorySelects() {
            const selects = ['categoryFilter', 'questionCategory'];
            
            selects.forEach(selectId => {
                const select = document.getElementById(selectId);
                if (select) {
                    const firstOption = select.querySelector('option');
                    select.innerHTML = '';
                    if (firstOption) {
                        select.appendChild(firstOption);
                    }
                    
                    categories.forEach(category => {
                        const option = document.createElement('option');
                        option.value = category.id;
                        option.textContent = `${category.icon} ${category.name}`;
                        select.appendChild(option);
                    });
                }
            });
        }

        async function loadQuestions() {
            try {
                const user = JSON.parse(localStorage.getItem('brainbrawler_user'));
                const response = await fetch(`http://${window.location.hostname}:3000/api/questions/my`, {
                    headers: {
                        'Authorization': `Bearer ${user.token}`
                    }
                });
                
                const data = await response.json();
                
                if (data.success) {
                    questions = data.questions;
                    renderQuestions();
                }
            } catch (error) {
                console.error('Failed to load questions:', error);
            }
        }

        function renderQuestions(questionsToRender = questions) {
            const container = document.getElementById('questionsContainer');
            
            if (questionsToRender.length === 0) {
                container.innerHTML = `
                    <div class="empty-state">
                        <i class="fas fa-question-circle"></i>
                        <h3>No questions found</h3>
                        <p>Create your first custom question to get started!</p>
                    </div>
                `;
                return;
            }

            container.innerHTML = questionsToRender.map(question => `
                <div class="question-card ${question.difficulty.toLowerCase()}">
                    <div class="question-header">
                        <div>
                            <div class="question-text">${question.text}</div>
                            <div class="question-meta">
                                <span><i class="fas fa-tag"></i> ${question.category?.name || 'Uncategorized'}</span>
                                <span><i class="fas fa-signal"></i> ${question.difficulty}</span>
                                <span><i class="fas fa-clock"></i> ${question.timeLimit || 30}s</span>
                            </div>
                        </div>
                        <div class="question-actions">
                            <button class="btn btn-warning" onclick="editQuestion('${question.id}')">
                                <i class="fas fa-edit"></i>
                            </button>
                            <button class="btn btn-danger" onclick="deleteQuestion('${question.id}')">
                                <i class="fas fa-trash"></i>
                            </button>
                        </div>
                    </div>
                    <div class="question-options">
                        ${question.options.map((option, index) => `
                            <div class="option ${index === question.correctAnswer ? 'correct' : ''}">
                                ${String.fromCharCode(65 + index)}. ${option}
                            </div>
                        `).join('')}
                    </div>
                    ${question.explanation ? `<p><strong>Explanation:</strong> ${question.explanation}</p>` : ''}
                </div>
            `).join('');
        }

        function filterQuestions() {
            const searchTerm = document.getElementById('searchInput').value.toLowerCase();
            const categoryFilter = document.getElementById('categoryFilter').value;
            const difficultyFilter = document.getElementById('difficultyFilter').value;

            const filtered = questions.filter(question => {
                const matchesSearch = question.text.toLowerCase().includes(searchTerm);
                const matchesCategory = !categoryFilter || question.categoryId === categoryFilter;
                const matchesDifficulty = !difficultyFilter || question.difficulty === difficultyFilter;
                
                return matchesSearch && matchesCategory && matchesDifficulty;
            });

            renderQuestions(filtered);
        }

        async function handleCreateQuestion(e) {
            e.preventDefault();
            
            const formData = new FormData(e.target);
            const questionData = {
                text: formData.get('questionText'),
                categoryId: formData.get('category'),
                difficulty: formData.get('difficulty'),
                options: [
                    formData.get('option0'),
                    formData.get('option1'),
                    formData.get('option2'),
                    formData.get('option3')
                ],
                correctAnswer: parseInt(formData.get('correctAnswer')),
                explanation: formData.get('explanation') || null
            };

            try {
                const user = JSON.parse(localStorage.getItem('brainbrawler_user'));
                const response = await fetch(`http://${window.location.hostname}:3000/api/questions`, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                        'Authorization': `Bearer ${user.token}`
                    },
                    body: JSON.stringify(questionData)
                });

                const data = await response.json();
                
                if (data.success) {
                    alert('Question created successfully!');
                    e.target.reset();
                    loadQuestions();
                    switchTab('my-questions');
                } else {
                    alert(data.message || 'Failed to create question');
                }
            } catch (error) {
                console.error('Failed to create question:', error);
                alert('Network error. Please try again.');
            }
        }

        function switchTab(tabName) {
            document.querySelectorAll('.content-section').forEach(section => {
                section.classList.remove('active');
            });
            
            document.querySelectorAll('.tab').forEach(tab => {
                tab.classList.remove('active');
            });
            
            document.getElementById(tabName).classList.add('active');
            
            document.querySelector(`button[onclick="switchTab('${tabName}')"]`).classList.add('active');
            
            currentTab = tabName;
        }

        function editQuestion(questionId) {
            // TODO: Implement edit functionality
            alert('Edit functionality coming soon!');
        }

        function deleteQuestion(questionId) {
            if (confirm('Are you sure you want to delete this question?')) {
                // TODO: Implement delete functionality
                alert('Delete functionality coming soon!');
            }
        }
    </script>
</body>
</html>
