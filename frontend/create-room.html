<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Create Room - BrainBrawler</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        .container {
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(10px);
            border-radius: 20px;
            padding: 40px;
            max-width: 600px;
            width: 100%;
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.1);
        }

        .header {
            text-align: center;
            margin-bottom: 30px;
        }

        .header h1 {
            color: #2d3748;
            font-size: 2rem;
            font-weight: 700;
            margin-bottom: 10px;
        }

        .premium-badge {
            display: inline-block;
            background: linear-gradient(45deg, #f093fb 0%, #f5576c 100%);
            color: white;
            padding: 5px 15px;
            border-radius: 20px;
            font-size: 0.8rem;
            font-weight: 600;
            margin-bottom: 20px;
        }

        .form-group {
            margin-bottom: 25px;
        }

        .form-group label {
            display: block;
            margin-bottom: 8px;
            color: #2d3748;
            font-weight: 600;
            font-size: 0.9rem;
        }

        .form-group input,
        .form-group select {
            width: 100%;
            padding: 12px 16px;
            border: 2px solid #e2e8f0;
            border-radius: 10px;
            font-size: 1rem;
            transition: border-color 0.3s ease;
            background: white;
        }

        .form-group input:focus,
        .form-group select:focus {
            outline: none;
            border-color: #667eea;
        }

        .form-row {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
        }

        .checkbox-group {
            display: flex;
            align-items: center;
            gap: 10px;
            margin-top: 10px;
        }

        .checkbox-group input[type="checkbox"] {
            width: auto;
            margin: 0;
        }

        .btn {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            padding: 15px 30px;
            border-radius: 10px;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            transition: transform 0.2s ease;
            width: 100%;
            margin-top: 20px;
        }

        .btn:hover {
            transform: translateY(-2px);
        }

        .btn-secondary {
            background: #718096;
            margin-right: 10px;
            width: auto;
        }

        .button-group {
            display: flex;
            justify-content: space-between;
            margin-top: 30px;
        }

        .error-message {
            background: #fed7d7;
            color: #c53030;
            padding: 10px 15px;
            border-radius: 8px;
            margin-bottom: 15px;
            display: none;
        }

        @media (max-width: 768px) {
            .container {
                padding: 20px;
            }
            
            .form-row {
                grid-template-columns: 1fr;
            }
            
            .button-group {
                flex-direction: column;
                gap: 10px;
            }
            
            .btn-secondary {
                width: 100%;
                margin-right: 0;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1><i class="fas fa-plus-circle"></i> Create Room</h1>
            <div class="premium-badge">
                <i class="fas fa-crown"></i> Premium Feature
            </div>
            <p>Create your custom quiz room with personalized settings</p>
        </div>

        <div class="error-message" id="errorMessage"></div>

        <form id="createRoomForm">
            <div class="form-group">
                <label for="roomName">Room Name</label>
                <input type="text" id="roomName" name="roomName" placeholder="Enter room name" required>
            </div>

            <div class="form-row">
                <div class="form-group">
                    <label for="maxPlayers">Max Players</label>
                    <select id="maxPlayers" name="maxPlayers" required>
                        <option value="2">2 Players</option>
                        <option value="4" selected>4 Players</option>
                        <option value="6">6 Players</option>
                        <option value="8">8 Players</option>
                    </select>
                </div>

                <div class="form-group">
                    <label for="questionTime">Time per Question</label>
                    <select id="questionTime" name="questionTime" required>
                        <option value="15">15 seconds</option>
                        <option value="30" selected>30 seconds</option>
                        <option value="45">45 seconds</option>
                        <option value="60">60 seconds</option>
                    </select>
                </div>
            </div>

            <div class="form-row">
                <div class="form-group">
                    <label for="totalQuestions">Total Questions</label>
                    <select id="totalQuestions" name="totalQuestions" required>
                        <option value="5">5 Questions</option>
                        <option value="10" selected>10 Questions</option>
                        <option value="15">15 Questions</option>
                        <option value="20">20 Questions</option>
                    </select>
                </div>

                <div class="form-group">
                    <label for="category">Category</label>
                    <select id="category" name="category" required>
                        <option value="">Select Category</option>
                    </select>
                </div>
            </div>

            <div class="form-group">
                <div class="checkbox-group">
                    <input type="checkbox" id="isPrivate" name="isPrivate">
                    <label for="isPrivate">Private Room (Password Protected)</label>
                </div>
                <div class="checkbox-group" id="passwordGroup" style="display: none; margin-top: 10px;">
                    <input type="password" id="password" name="password" placeholder="Room password" style="width: 100%;">
                </div>
            </div>

            <div class="button-group">
                <button type="button" class="btn btn-secondary" onclick="goBack()">
                    <i class="fas fa-arrow-left"></i> Back
                </button>
                <button type="submit" class="btn">
                    <i class="fas fa-play"></i> Create Room
                </button>
            </div>
        </form>
    </div>

    <script>
        document.addEventListener('DOMContentLoaded', function() {
            checkPremiumAccess();
            loadCategories();
            setupEventListeners();
        });

        function checkPremiumAccess() {
            const user = JSON.parse(localStorage.getItem('brainbrawler_user') || '{}');
            if (!user.token || (user.accountType !== 'PREMIUM' && user.accountType !== 'ADMIN')) {
                alert('This feature requires a Premium account! Upgrade now to create custom rooms.');
                window.location.href = 'lobby.html';
                return;
            }
        }

        function setupEventListeners() {
            document.getElementById('isPrivate').addEventListener('change', function() {
                const passwordGroup = document.getElementById('passwordGroup');
                passwordGroup.style.display = this.checked ? 'block' : 'none';
            });

            document.getElementById('createRoomForm').addEventListener('submit', handleSubmit);
        }

        async function loadCategories() {
            try {
                const response = await fetch(`http://${window.location.hostname}:3000/api/game/categories`);
                const data = await response.json();
                
                if (data.categories) {
                    const categorySelect = document.getElementById('category');
                    data.categories.forEach(category => {
                        const option = document.createElement('option');
                        option.value = category.id;
                        option.textContent = `${category.icon} ${category.name}`;
                        categorySelect.appendChild(option);
                    });
                }
            } catch (error) {
                console.error('Failed to load categories:', error);
            }
        }

        async function handleSubmit(e) {
            e.preventDefault();
            
            const formData = new FormData(e.target);
            const roomData = {
                name: formData.get('roomName'),
                maxPlayers: parseInt(formData.get('maxPlayers')),
                questionTime: parseInt(formData.get('questionTime')),
                totalQuestions: parseInt(formData.get('totalQuestions')),
                category: formData.get('category'),
                isPrivate: formData.get('isPrivate') === 'on',
                password: formData.get('password') || null
            };

            try {
                const user = JSON.parse(localStorage.getItem('brainbrawler_user'));
                
                const response = await fetch(`http://${window.location.hostname}:3000/api/game/create-room`, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                        'Authorization': `Bearer ${user.token}`
                    },
                    body: JSON.stringify(roomData)
                });

                const data = await response.json();
                
                if (data.success) {
                    window.location.href = `game.html?room=${data.roomCode}`;
                } else {
                    showError(data.message || 'Failed to create room');
                }
            } catch (error) {
                console.error('Failed to create room:', error);
                showError('Network error. Please try again.');
            }
        }

        function showError(message) {
            const errorElement = document.getElementById('errorMessage');
            errorElement.textContent = message;
            errorElement.style.display = 'block';
            setTimeout(() => {
                errorElement.style.display = 'none';
            }, 5000);
        }

        function goBack() {
            window.location.href = 'lobby.html';
        }
    </script>
</body>
</html> 
</html>
